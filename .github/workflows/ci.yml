name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up virtual environment and install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      - run: |
          . .venv/bin/activate
          python3 -m pytest -q
