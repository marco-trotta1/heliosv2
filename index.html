<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helios</title>
    <meta
      name="description"
      content="Helios is an irrigation decision-support prototype with a static demo mode and an optional live API mode."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Manrope", "sans-serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-[var(--bg)] text-[var(--text)] antialiased">
    <div id="demo-mode-banner" style="
      background: #d9c8a0;
      color: #2a3d2f;
      text-align: center;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      position: sticky;
      top: 0;
      z-index: 9999;
      border-bottom: 1px solid rgba(41, 90, 67, 0.14);
    ">
      Demo mode: browser-computed estimates only. Live backend required for farm use.
    </div>
    <div id="app"></div>
    <script src="config.js"></script>
    <script src="viewer.js" type="module"></script>
    <script>
      // Hide the demo banner if the app is running in live API mode
      (function() {
        try {
          if (window.HELIOS_CONFIG && window.HELIOS_CONFIG.mode === 'live') {
            var banner = document.getElementById('demo-mode-banner');
            if (banner) banner.style.display = 'none';
          }
        } catch(e) {}
      })();
    </script>
  </body>
</html>
